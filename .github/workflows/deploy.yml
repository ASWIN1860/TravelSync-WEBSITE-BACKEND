name: Deploy Backend
on:
  push:
    branches:
      - master  # Or 'main' if you eventually change branch names

jobs:
  web-deploy:
    name: Deploy to MilesWeb cPanel
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Sync Files to cPanel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /backendapp/ # Your cPanel Python App folder
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          venv/**
          virtualenv/**
          __pycache__/**
          .env
          db.sqlite3
          *.zip
